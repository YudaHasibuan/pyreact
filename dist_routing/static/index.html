<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PyReact Pre-rendered SEO Index</title>
    <meta name="description" content="Sleek and optimized PyReact SEO Pre-rendered Page" />
    <meta name="robots" content="index, follow" />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#090d16]">
    <div id="root">
<div class="min-h-screen text-white p-6 bg-[#090d16]" style="font-family: 'Outfit', sans-serif;">
            <nav class="fixed top-0 inset-x-0 z-50 backdrop-blur border-b border-white/10 px-6 py-3 flex items-center justify-between bg-[#111827]/80"><span class="font-bold text-lg text-white">PyReact App</span></nav>
            <div className="pt-24 max-w-5xl mx-auto px-6">
                <h1 class="text-4xl font-extrabold text-white tracking-tight text-center">Selamat Datang di PyReact</h1>
                
                    Framework fullstack Python + React dalam satu file.
                </p>

                <div className="mt-6 flex gap-3 flex-wrap">
                    <a href="/blog"
                       onClick="(e) => "
                       className="px-5 py-2.5 bg-blue-600 hover:bg-blue-500 text-white rounded-xl text-sm font-semibold transition">
                        Lihat Blog
                    </a>
                    <a href="/dashboard"
                       className="px-5 py-2.5 bg-white/10 hover:bg-white/20 text-white rounded-xl text-sm font-semibold transition border border-white/10">
                        Dashboard (Protected)
                    </a>
                </div>

                <div className="mt-10">
                    Muat Posts
                    {posts && (
                        <div className="mt-4 grid gap-4">
                            {posts.map(p => (
                                <div class="border border-white/10 p-6 bg-[#111827] rounded-[12px] shadow-xl">
                                    <p class="text-gray-400 mt-2">Oleh: </p>
                                </div>
                            ))}
                        </div>
                    )}
                </div>
            </div>
        </div>
    </div>
</body>
</html>
